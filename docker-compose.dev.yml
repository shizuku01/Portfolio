version: '3.8'

services:
  # Backend API Service (Development)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: website-backend-dev
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - website-network
    restart: unless-stopped
    command: npm run dev

  # Frontend Service (Development)
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: website-frontend-dev
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - website-network
    restart: unless-stopped
    command: npm start

networks:
  website-network:
    driver: bridge
